preset:
  id: ios.axiom.apple_maps_trips
  name: Apple Maps Trips
  os: iOS
  tool: AXIOM
  version: 1.0
  tier: secondary

input_selector:
  format: csv
  name: "Apple Maps Trips.csv"
  delimiter: ","
  encoding: "utf-8-sig"

expected_columns:
  - Record
  - "Origin Address"
  - "Destination Address"
  - "Search Term"
  - "Origin Latitude"
  - "Origin Longitude"
  - "Destination Latitude"
  - "Destination Longitude"
  - "Trip ID"
  - "Record Date/Time - UTC+00:00 (dd.MM.yyyy)"
  - "Start Date/Time - UTC+00:00 (dd.MM.yyyy)"
  - "End Date/Time - UTC+00:00 (dd.MM.yyyy)"
  - Source
  - Location
  - "Item ID"

patterns:
  tz: "(?P<z>UTC[+-]\\d{2}:\\d{2}(?:\\[DST\\])?)"

source_record_uid: 'column("Item ID")'

common:
  entity:        param(entity)
  entity_type:   const(device)
  linked_entity: 'column("Trip ID")'
  source_label:    const(ZRTLEARNEDLOCATIONOFINTERESTTRANSITIONMO)
  input_record_id:    column(Location)
  raw_source_path: column(Source)

# Searches, not observed travel: origin/destination are referenced places and the
# Start/End are the planned (intended) trip times; Record is the DB write time.
assertions:
  - position:
      latitude_wgs84:  'column("Origin Latitude")'
      longitude_wgs84: 'column("Origin Longitude")'
      raw_position:    'column("Origin Address")'
      position_type:   const(origin)
    time:
      instant: 'column("Start Date/Time - * (dd.MM.yyyy)")'
      format:  "%d.%m.%Y %H:%M:%S.%f"
      zone:    { from: 'header("Start Date/Time - * (dd.MM.yyyy)")', pipe: "regex(tz, group=z)" }
    links:
      entity_position:  references
      entity_time:      intended_for
      spatial_temporal: instant

  - position:
      latitude_wgs84:  'column("Destination Latitude")'
      longitude_wgs84: 'column("Destination Longitude")'
      raw_position:    'column("Destination Address")'
      position_type:   const(destination)
    time:
      instant: 'column("End Date/Time - * (dd.MM.yyyy)")'
      format:  "%d.%m.%Y %H:%M:%S.%f"
      zone:    { from: 'header("End Date/Time - * (dd.MM.yyyy)")', pipe: "regex(tz, group=z)" }
    links:
      entity_position:  references
      entity_time:      intended_for
      spatial_temporal: instant

  - position:
      position_type: const(record)
    time:
      instant: 'column("Record Date/Time - * (dd.MM.yyyy)")'
      format:  "%d.%m.%Y %H:%M:%S.%f"
      zone:    { from: 'header("Record Date/Time - * (dd.MM.yyyy)")', pipe: "regex(tz, group=z)" }
    links:
      entity_position:  unknown
      entity_time:      recorded_at
      spatial_temporal: instant
