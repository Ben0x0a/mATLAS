preset:
  id: ios.axiom.significant_locations_visits
  name: Significant Locations Visits
  os: iOS
  tool: AXIOM
  version: 1.0
  tier: secondary

match:
  type: csv
  as_file: "Significant Locations Visits.csv"
  delimiter: ","
  encoding: "utf-8-sig"

expected_columns:
  - Record
  - Address
  - City
  - Country
  - "State/Province"
  - "ZIP/Postal Code"
  - "Vicinity Entry Date/Time"
  - "Vicinity Exit Date/Time"
  - "Created Date/Time - UTC+00:00 (dd.MM.yyyy)"
  - Latitude
  - Longitude
  - Accuracy
  - Source
  - Location
  - "Deleted source"
  - "Recovery method"
  - "Item ID"

patterns:
  tz: "(?P<z>UTC[+-]\\d{2}:\\d{2})"

record_uid: 'column("Item ID")'

common:
  entity:          param(entity)
  entity_type:     const(device)
  source_label:    const(ZRTLEARNEDLOCATIONOFINTERESTVISITMO)
  position_source: const(significant_location)
  input_record_id:    column(Location)
  raw_source_path: column(Source)
  raw_position:    column(Address)

# One source row -> the visit interval AND the record-creation instant. The spatial
# fields are shared, so this is two assertions over the same position.
assertions:
  - position:
      latitude_wgs84:        column(Latitude)
      longitude_wgs84:       column(Longitude)
      horizontal_accuracy_m: column(Accuracy)
    time:
      interval:
        lower: 'column("Vicinity Entry Date/Time")'
        upper: 'column("Vicinity Exit Date/Time")'
      format: "%d.%m.%Y %H:%M:%S.%f"
    links:
      entity_position:  at
      entity_time:      observed_at
      spatial_temporal: continuous_during_interval

  - position:
      latitude_wgs84:        column(Latitude)
      longitude_wgs84:       column(Longitude)
      horizontal_accuracy_m: column(Accuracy)
    time:
      instant: 'column("Created Date/Time - * (dd.MM.yyyy)")'
      format:  "%d.%m.%Y %H:%M:%S.%f"
      zone:    { from: 'header("Created Date/Time - * (dd.MM.yyyy)")', pipe: "regex(tz, group=z)" }
    links:
      entity_position:  at
      entity_time:      recorded_at
      spatial_temporal: instant
