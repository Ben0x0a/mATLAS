name: AXIOM iOS - Cached Locations
version: "1.0"
parser:
  name: axiom_ios_cached_locations
  version: "1.0"

source_tier: secondary

selectors:
  - source_type: csv
    file_name: "Cached Locations.csv"

extract:
  csv:
    delimiter: ","
    encoding: "utf-8-sig"

# Full source inventory. Columns present here but absent from any mapping below are
# the research frontier (e.g. Record, Tags, Comments, Evidence number, Deleted source).
expected_columns:
  - Record
  - Tags
  - Comments
  - Latitude
  - Longitude
  - "Accuracy (m)"
  - "Altitude (m)"
  - "Altitude Accuracy (m)"
  - Direction
  - "Speed (m/s)"
  - "Timestamp Date/Time - UTC+00:00 (dd.MM.yyyy)"
  - Source
  - Location
  - "Evidence number"
  - "Deleted source"
  - "Recovery method"
  - "Item ID"

source_row_id:
  from: "Item ID"

common:
  entity: {value: device}
  entity_type: {value: device}
  tool_label: {value: ZRTCLLOCATIONMO}
  position_source: {value: GNSS}
  record_locator: {from: "Location"}
  source_file_path: {from: "Source"}
  deleted:
    from: "Recovery method"
    pipe:
      - lookup: {Parsing: intact, Carving: recovered, Deleted: deleted}
        on_unknown: "null"

assertions:
  - latitude_wgs84: {from: Latitude, pipe: [{cast: float}]}
    longitude_wgs84: {from: Longitude, pipe: [{cast: float}]}
    altitude_m: {from: "Altitude (m)", pipe: [{cast: float}]}
    horizontal_accuracy_m: {from: "Accuracy (m)", pipe: [{cast: float}]}
    vertical_accuracy_m: {from: "Altitude Accuracy (m)", pipe: [{cast: float}]}
    horizontal_speed_kmh: {from: "Speed (m/s)", pipe: [{cast: float}, {arithmetic: "value * 3.6"}]}
    heading_deg: {from: Direction, pipe: [{cast: float}]}
    entity_position_link: at
    temporal:
      # Wildcard: the header embeds the export timezone (UTC+00:00), which can change.
      - instant: "Timestamp Date/Time - * (dd.MM.yyyy)"
        pipe: [{parse_datetime: "%d.%m.%Y %H:%M:%S.%f"}]
        entity_time_link: observed_at
        spatial_temporal_link: instant
        # Capture the timezone from the column NAME itself via from_name + regex_extract.
        # time_zone is shared by both bounds of the assertion.
        time_zone:
          from_name: "Timestamp Date/Time - * (dd.MM.yyyy)"
          pipe: [{regex_extract: "(UTC[+-][0-9]{2}:[0-9]{2})"}]
