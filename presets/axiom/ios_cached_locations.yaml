preset:
  id: ios.axiom.cached_locations
  name: Cached Locations
  os: iOS
  tool: AXIOM
  version: 1.0
  tier: secondary

match:
  type: csv
  as_file: "Cached Locations.csv"
  delimiter: ","
  encoding: "utf-8-sig"

patterns:
  tz: "(?P<z>UTC[+-]\\d{2}:\\d{2})"   # the export timezone embedded in the header
lookup_tables:
  recovery: {Parsing: intact, Carving: recovered, Deleted: deleted}

row_uid: 'column("Item ID")'

common:
  entity:          const(device)
  entity_type:     const(device)
  tool_label:      const(ZRTCLLOCATIONMO)
  position_source: const(GNSS)
  record_locator:  column(Location)
  source_file_path: column(Source)
  deleted: { from: 'column("Recovery method")', pipe: "lookup(recovery, on_unknown=null)" }

assertions:
  - position:
      latitude_wgs84:        column(Latitude)
      longitude_wgs84:       column(Longitude)
      altitude_m:            'column("Altitude (m)")'
      horizontal_accuracy_m: 'column("Accuracy (m)")'
      vertical_accuracy_m:   'column("Altitude Accuracy (m)")'
      heading_deg:           column(Direction)
      horizontal_speed_kmh:  { from: 'column("Speed (m/s)")', unit: m/s }
    time:
      # Wildcard: the header embeds the export timezone, which is captured into
      # time_zone via header() + regex and applied to parsing automatically.
      instant: 'column("Timestamp Date/Time - * (dd.MM.yyyy)")'
      format:  "%d.%m.%Y %H:%M:%S.%f"
      zone:    { from: 'header("Timestamp Date/Time - * (dd.MM.yyyy)")', pipe: "regex(tz, group=z)" }
    links:
      entity_position:  at
      entity_time:      observed_at
      spatial_temporal: instant
