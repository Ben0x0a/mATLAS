preset:
  id: ios.routined.significant_visits
  name: Routined Significant Location Visits
  os: iOS
  tool:                       # empty: primary source (the device's own database)
  os_version: ">=13"
  version: 1.0
  tier: primary

input_selector:
  format: sqlite
  path: /private/var/mobile/Library/Caches/com.apple.routined/Local.sqlite
  table: ZRTLEARNEDLOCATIONOFINTERESTVISITMO

# Full ZRTLEARNEDLOCATIONOFINTERESTVISITMO column inventory.
expected_columns:
  - Z_PK
  - Z_ENT
  - Z_OPT
  - ZDATAPOINTCOUNT
  - ZLOCATIONOFINTERESTSOURCE
  - ZLOCATIONREFERENCEFRAME
  - ZLOCATIONSOURCEACCURACY
  - ZLOCATIONOFINTEREST
  - Z_FOK_LOCATIONOFINTEREST
  - ZCONFIDENCE
  - ZCREATIONDATE
  - ZENTRYDATE
  - ZEXITDATE
  - ZEXPIRATIONDATE
  - ZLOCATIONALTITUDE
  - ZLOCATIONHORIZONTALUNCERTAINTY
  - ZLOCATIONLATITUDE
  - ZLOCATIONLONGITUDE
  - ZLOCATIONOFINTERESTCONFIDENCE
  - ZLOCATIONVERTICALUNCERTAINTY
  - ZIDENTIFIER

# source_record_uid omitted: Z_PK is not a stable UID -> generate a deterministic, content-addressed UID.

common:
  entity:          param(entity)
  entity_type:     const(device)
  source_label:    const(ZRTLEARNEDLOCATIONOFINTERESTVISITMO)
  position_source: const(significant_location)
  raw_source_path: preset(path)   # device db path; input_record_id defaults to <table>#<ordinal>

assertions:
  - position:
      latitude_wgs84:        column(ZLOCATIONLATITUDE)
      longitude_wgs84:       column(ZLOCATIONLONGITUDE)
      altitude_m:            column(ZLOCATIONALTITUDE)
      horizontal_accuracy_m: column(ZLOCATIONHORIZONTALUNCERTAINTY)
      vertical_accuracy_m:   column(ZLOCATIONVERTICALUNCERTAINTY)
      position_type:         const(visit)
    time:
      interval:                      # the visit dwell window (Cocoa epoch -> us)
        lower: column(ZENTRYDATE)
        upper: column(ZEXITDATE)
      epoch: cocoa
      zone:  const(UTC)
    links:
      entity_position:  at
      entity_time:      observed_at
      spatial_temporal: continuous_during_interval
