preset:
  id: ios.routined.cached_locations
  name: Routined Cached Locations (CLLocation)
  os: iOS
  tool:                       # empty: primary source (the device's own database)
  os_version: ">=13"
  version: 1.0
  tier: primary

# SQLite source, located by its anchored device path (prefix-tolerant: matches a loose
# folder tree and a full-filesystem ZIP alike, skipping a "filesystem1/" wrapper). The
# path discriminates because an iOS dump holds many unrelated "Cache.sqlite" files.
input_selector:
  format: sqlite
  path: /private/var/mobile/Library/Caches/com.apple.routined/Cache.sqlite
  table: ZRTCLLOCATIONMO

# Full ZRTCLLOCATIONMO column inventory. Columns present here but unmapped below are the
# research frontier (reported in the warnings sidecar).
expected_columns:
  - Z_PK
  - Z_ENT
  - Z_OPT
  - ZINTEGRITY
  - ZSIGNALENVIRONMENTTYPE
  - ZTYPE
  - ZALTITUDE
  - ZCOURSE
  - ZCOURSEACCURACY
  - ZHORIZONTALACCURACY
  - ZLATITUDE
  - ZLONGITUDE
  - ZSPEED
  - ZSPEEDACCURACY
  - ZTIMESTAMP
  - ZVERTICALACCURACY

# source_record_uid omitted: a device-DB rowid (Z_PK) is not a stable UID, so a deterministic
# content-addressed UID is generated per row instead.

common:
  entity:          param(entity)
  entity_type:     const(device)
  source_label:    const(ZRTCLLOCATIONMO)
  position_source: const(GNSS)
  raw_source_path: preset(path)   # device db path; input_record_id defaults to ZRTCLLOCATIONMO#<ordinal>

assertions:
  - position:
      latitude_wgs84:                 column(ZLATITUDE)
      longitude_wgs84:                column(ZLONGITUDE)
      altitude_m:                     column(ZALTITUDE)
      horizontal_accuracy_m:          column(ZHORIZONTALACCURACY)
      vertical_accuracy_m:            column(ZVERTICALACCURACY)
      heading_deg:                    column(ZCOURSE)
      horizontal_speed_kmh:           { from: column(ZSPEED), unit: m/s }
      horizontal_speed_accuracy_kmh:  {from: column(ZSPEEDACCURACY), unit: m/s }
    time:
      instant: column(ZTIMESTAMP)   # Cocoa/Core-Data epoch -> Unix us
      epoch:   cocoa
      zone:    const(UTC)
    links:
      entity_position:  at
      entity_time:      observed_at
      spatial_temporal: instant
