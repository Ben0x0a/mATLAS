preset:
  id: ios.routined.cached_locations
  name: Routined Cached Locations (CLLocation)
  os: iOS
  tool:                       # empty: primary source (the device's own database)
  os_version: ">=13"
  version: 1.0
  tier: primary

# SQLite source, read from a full-filesystem ZIP or as a direct file. Inside an
# archive the internal db_relpath discriminates (an iOS dump holds many unrelated
# "Cache.sqlite" files); for a direct file the as_file name is used.
match:
  type: sqlite
  in_archive: /private/var/mobile/Library/Caches/com.apple.routined/Cache.sqlite
  as_file: Cache.sqlite
  table: ZRTCLLOCATIONMO

# row_uid omitted: a device-DB rowid (Z_PK) is not a stable UID, so a deterministic
# UID is generated per row instead.

common:
  entity:          const(device)
  entity_type:     const(device)
  tool_label:      const(ZRTCLLOCATIONMO)
  position_source: const(GNSS)
  record_locator:  filename(name)

assertions:
  - position:
      latitude_wgs84:        column(ZLATITUDE)
      longitude_wgs84:       column(ZLONGITUDE)
      altitude_m:            column(ZALTITUDE)
      horizontal_accuracy_m: column(ZHORIZONTALACCURACY)
      vertical_accuracy_m:   column(ZVERTICALACCURACY)
      heading_deg:           column(ZCOURSE)
      horizontal_speed_kmh:  { from: column(ZSPEED), unit: m/s }
    time:
      instant: column(ZTIMESTAMP)   # Cocoa/Core-Data epoch -> Unix ns
      epoch:   cocoa
      zone:    const(UTC)
    links:
      entity_position:  at
      entity_time:      observed_at
      spatial_temporal: instant
