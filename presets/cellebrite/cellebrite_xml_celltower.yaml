preset:
  id: cellebrite.xml.celltower
  name: Cellebrite XML Cell Tower
  tool: Cellebrite UFED
  version: 1.0
  tier: secondary

input_selector:
  format: xml
  name: report.xml
  namespace: http://pa.cellebrite.com/report/2.0
  model: CellTower

source_record_uid: column(uuid)

lookup_tables:
  recovery: {Intact: intact, Deleted: deleted, Unknown: unknown}

expected_columns:
  - uuid
  - deleted_state
  - decoding_confidence
  - UserMapping
  - Position.Latitude
  - Position.Longitude
  - TimeStamp
  - TimeStamp.format
  - Type            # GSM / LTE / ...
  - MCC
  - MNC
  - LAC
  - CID

common:
  entity:          param(entity)
  entity_type:     const(device)
  source_label:    const(CellTower)
  position_source: const(cell)
  raw_source_path: column(source_path)
  deleted:         { from: column(deleted_state), pipe: "lookup(recovery, on_unknown=null)" }

assertions:
  - position:
      latitude_wgs84:  column(Position.Latitude)
      longitude_wgs84: column(Position.Longitude)
    time:
      instant: column(TimeStamp)
      format:  iso8601
    links:
      entity_position:  at
      entity_time:      observed_at
      spatial_temporal: instant
