# Golden fixture: a PRIMARY preset with NO source_record_uid, so the engine generates a
# deterministic, content-addressed uuid5 (fingerprint | raw_source_path | input_record_id).
# input_record_id is unmapped here, so it defaults to "#<ordinal>".
preset:
  id: golden.primary.cached
  name: Golden Primary Cached
  os: iOS
  os_version: ">=15"
  version: 1.0
  tier: primary

input_selector:
  format: csv
  name: cached.csv

expected_columns:
  - Latitude
  - Longitude
  - "Accuracy (m)"
  - "Speed (m/s)"
  - "Timestamp Date/Time - UTC+00:00 (dd.MM.yyyy)"
  - Source
  - Location
  - "Item ID"

common:
  entity:          const(device)
  entity_type:     const(device)
  source_label:    const(ZRTCLLOCATIONMO)
  position_source: const(GNSS)
  raw_source_path: column(Source)

assertions:
  - position:
      latitude_wgs84:        column(Latitude)
      longitude_wgs84:       column(Longitude)
      horizontal_accuracy_m: 'column("Accuracy (m)")'
      horizontal_speed_kmh:  { from: 'column("Speed (m/s)")', unit: m/s }
    time:
      instant: 'column("Timestamp Date/Time - UTC+00:00 (dd.MM.yyyy)")'
      format:  "%d.%m.%Y %H:%M:%S.%f"
      zone:    const(UTC+00:00)
    links:
      entity_position:  at
      entity_time:      observed_at
      spatial_temporal: instant
